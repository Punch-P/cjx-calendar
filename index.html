<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CJX First Lot Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Sarabun', sans-serif; background: #111; color: #e0e0e0; font-size: 14px; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

.header { background: #0d0d0d; color: white; padding: 10px 20px; display: flex; align-items: center; border-bottom: 1px solid #222; flex-shrink: 0; }
.header-title { font-size: 15px; font-weight: 500; color: #ffffff; }
.header-sub { font-size: 11px; opacity: 0.8; margin-top: 1px; color: #ccc; }

.top-bar { background: #161616; padding: 8px 16px; border-bottom: 1px solid #222; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; flex-shrink: 0; }
.top-bar select { border: 1px solid #333; border-radius: 6px; padding: 5px 10px; font-size: 13px; font-family: 'Sarabun', sans-serif; outline: none; background: #1e1e1e; color: #e0e0e0; }
.top-bar select:focus { border-color: #5c6bc0; }
.view-tabs { display: flex; gap: 4px; margin-left: auto; }
.tab-btn { padding: 5px 12px; border: 1px solid #333; border-radius: 6px; background: #1e1e1e; cursor: pointer; font-size: 13px; font-family: 'Sarabun', sans-serif; color: #bbb; }
.tab-btn.active { background: #5c6bc0; color: white; border-color: #5c6bc0; }
.reset-btn { padding: 5px 12px; border: 1px solid #c62828; border-radius: 6px; background: #1e1e1e; cursor: pointer; font-size: 13px; font-family: 'Sarabun', sans-serif; color: #ef5350; }
.reset-btn:hover { background: #2a0a0a; }

.legend { background: #161616; padding: 6px 16px; border-bottom: 1px solid #222; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; flex-shrink: 0; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #aaa; }
.legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

.store-count { font-size: 11px; color: #999; padding: 4px 16px; background: #161616; border-bottom: 1px solid #222; flex-shrink: 0; }

.main-layout { display: flex; flex: 1; overflow: hidden; }
.resizer { width: 4px; background: #333; cursor: col-resize; flex-shrink: 0; transition: background 0.2s; }
.resizer:hover { background: #5c6bc0; }

/* ซ้าย 30% detail panel */
.detail-panel { width: 220px; min-width: 120px; max-width: 500px; border-right: 1px solid #222; display: flex; flex-direction: column; background: #141414; overflow: hidden; flex-shrink: 0; }
.detail-store-info { background: #1a1a1a; padding: 16px 16px; border-bottom: 1px solid #222; flex: 0 0 auto; overflow-y: auto; }
.detail-store-name { font-size: 20px; font-weight: 500; color: #fff; margin-bottom: 8px; }
.detail-store-meta { font-size: 14px; color: #ccc; margin-bottom: 6px; line-height: 1.6; }
.detail-chips { display: flex; gap: 6px; flex-wrap: wrap; }
.detail-chip { font-size: 13px; padding: 5px 12px; border-radius: 6px; line-height: 1.5; }
.detail-timeline { padding: 10px 14px; overflow-y: auto; flex: 1; border-top: 1px solid #222; overflow-y: auto; }
.tl-section { font-size: 11px; font-weight: 500; color: #999; letter-spacing: 0.5px; text-transform: uppercase; margin: 8px 0 5px; }
.tl-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.tl-date { width: 56px; font-size: 12px; color: #ccc; flex-shrink: 0; }
.tl-event { border-radius: 3px; padding: 3px 8px; font-size: 12px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
.tl-event-task { background: #0d1f2d; color: #90CAF9; border-left: 3px solid #42A5F5; border-radius: 3px; padding: 3px 8px; font-size: 12px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
.tl-event-task { background: #FFF9C4; color: #E65100; border-left: 3px solid #FFE082; border-radius: 3px; padding: 3px 8px; font-size: 12px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
.tl-event:hover { opacity: 0.8; }
.detail-empty { color: #888; font-size: 12px; padding: 20px 0; text-align: center; }
.detail-fair { padding: 10px 16px; border-bottom: 1px solid #222; flex-shrink: 0; }
.fair-title { font-size: 11px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.fair-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 3px; }
.fair-label { color: #888; }
.fair-val { color: #ddd; font-weight: 500; }
.fair-title { font-size: 11px; font-weight: 500; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.fair-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; }
.fair-label { color: #888; }
.fair-val { color: #fff; font-weight: 500; }

/* ขวา 70% ปฏิทิน */
.cal-side { flex: 1; min-width: 0; display: flex; flex-direction: column; overflow: hidden; background: #fff; color: #2c2c2c; }
.nav-bar { background: #f9f9f9; padding: 6px 16px; border-bottom: 1px solid #e0e0e0; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.nav-btn { background: #e8e8e8; border: 1px solid #bbb; border-radius: 6px; padding: 4px 12px; cursor: pointer; font-size: 16px; color: #111; font-weight: 500; }
.nav-btn:hover { background: #e0e0e0; }
.month-label { font-size: 15px; font-weight: 500; color: #111; min-width: 160px; }

.calendar { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-height: 0; }
.day-headers { display: grid; grid-template-columns: 36px repeat(7,1fr); background: #f9f9f9; border-bottom: 1px solid #e0e0e0; flex-shrink: 0; }
.day-header { padding: 6px; text-align: center; font-size: 12px; font-weight: 500; color: #888; }
.day-header.sun { color: #e53935; }
.day-header.sat { color: #1e88e5; }

.cal-grid { display: grid; grid-template-columns: 36px repeat(7, 1fr); flex: 1; }
.week-month-bar { display: none; }

.cal-cell { border-right: 0.5px solid #f0f0f0; border-bottom: 0.5px solid #f0f0f0; padding: 5px; overflow: hidden; min-height: 80px; background: white; }


.month-even { background: #ffffff; }
.month-odd  { background: #f5f5f5; }
.cal-cell.fair-peak  { background: #C8E6C9 !important; }
.cal-cell.fair-normal { background: #E8F5E9 !important; }
.cal-cell.is-today   { background: #fff5f5 !important; outline: 2px solid #e53935; outline-offset: -2px; }

.week-month-bar { display: none; }


.new-month-border { border-left: 2px solid #5c6bc0 !important; }

.month-col { background: #1a1a1a; border-right: 1px solid #333; border-bottom: 0.5px solid #1e1e1e; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #666; font-weight: 500; writing-mode: vertical-rl; text-orientation: mixed; }
.day-num { font-size: 13px; font-weight: 500; color: #444; margin-bottom: 3px; display: inline-flex; width: 22px; height: 22px; align-items: center; justify-content: center; border-radius: 50%; }
.day-num.today { background: #e53935 !important; color: white !important; font-weight: 700 !important; }
.day-num.sun { color: #e53935; }
.day-num.sat { color: #1e88e5; }
.other-month .day-num { color: #333 !important; }

.event { border-radius: 3px; padding: 1px 5px; font-size: 11px; margin-bottom: 2px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; opacity: 0.9; }
.event:hover { opacity: 1; }
.event-more { font-size: 11px; color: #5c6bc0; padding: 1px 4px; cursor: pointer; font-weight: 500; }
.event-more:hover { text-decoration: underline; }

.color-food-pick    { background: #BBDEFB; color: #0D47A1; }
.color-food-del     { background: #64B5F6; color: #0D47A1; }
.color-store-pick   { background: #C8E6C9; color: #1B5E20; }
.color-store-del    { background: #81C784; color: #1B5E20; }
.color-bao-pick     { background: #E1BEE7; color: #4A148C; }
.color-bao-del      { background: #BA68C8; color: #4A148C; }
.color-nonfood-pick { background: #FFE0B2; color: #BF360C; }
.color-nonfood-del  { background: #FFB74D; color: #BF360C; }
.color-life-pick    { background: #B2EBF2; color: #006064; }
.color-life-del     { background: #4DD0E1; color: #006064; }
.color-pro-pick     { background: #F8BBD0; color: #880E4F; }
.color-pro-del      { background: #F48FB1; color: #880E4F; }
.color-chill-pick   { background: #DCEDC8; color: #33691E; }
.color-chill-del    { background: #AED581; color: #33691E; }
.color-open         { background: #37474F; color: #FFFFFF; }
.color-task         { background: #FFF9C4; color: #E65100; border: 1px solid #FFE082; }
.color-task-lo      { background: #F3E5F5; color: #6A1B9A; border: 1px solid #CE93D8; }
.tl-event-tasklo    { background: #1a0d2a; color: #CE93D8; border-left: 3px solid #AB47BC; border-radius: 3px; padding: 3px 8px; font-size: 12px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }

.loading { text-align: center; padding: 50px; color: #444; font-size: 14px; }

.day-popup-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 300; align-items: center; justify-content: center; }
.day-popup-bg.show { display: flex; }
.day-popup { background: #ffffff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 16px; min-width: 240px; max-width: 320px; max-height: 70vh; overflow-y: auto; }
.day-popup-title { font-size: 14px; font-weight: 500; margin-bottom: 10px; color: #1a1a2e; }
.day-popup-close { float: right; background: none; border: none; font-size: 18px; cursor: pointer; color: #aaa; margin-top: -4px; }

.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; align-items: center; justify-content: center; }
.modal-bg.show { display: flex; }
.modal { background: #1e1e1e; border: 1px solid #333; border-radius: 12px; padding: 20px; max-width: 460px; width: 92%; max-height: 85vh; overflow-y: auto; }
.modal-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
.modal-title { font-size: 16px; font-weight: 500; color: #fff; }
.modal-sub { font-size: 12px; color: #555; margin-top: 2px; }
.modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: #555; line-height: 1; }
.modal-section { font-size: 11px; font-weight: 500; color: #888; letter-spacing: 0.5px; margin: 12px 0 6px; text-transform: uppercase; }
.modal-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 0.5px solid #222; font-size: 13px; }
.modal-row:last-child { border-bottom: none; }
.modal-key { color: #aaa; }
.modal-val { font-weight: 500; color: #e0e0e0; }

.config-wrap { padding: 14px; background: #111; }
.config-title { font-size: 14px; font-weight: 500; margin-bottom: 10px; color: #e0e0e0; }
.config-table { width: 100%; border-collapse: collapse; background: #1e1e1e; border-radius: 10px; overflow: hidden; border: 1px solid #333; }
.config-table th { background: #161616; padding: 10px 14px; text-align: left; font-size: 12px; color: #555; font-weight: 500; }
.config-table td { padding: 8px 14px; border-top: 0.5px solid #222; font-size: 13px; color: #ccc; }
.config-table select { border: 1px solid #333; border-radius: 4px; padding: 3px 8px; font-size: 12px; font-family: 'Sarabun', sans-serif; background: #111; color: #e0e0e0; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">CJX First Lot Calendar</div>
    <div class="header-sub">ปฏิทินร้านใหม่ — อัปเดตอัตโนมัติทุกวัน</div>
  </div>
</div>

<div class="top-bar">
  <select id="storeSelect" style="width:260px">
    <option value="">-- ทุกร้าน --</option>
  </select>
  <button class="reset-btn" id="resetBtn">↺ Reset</button>
  <div class="view-tabs">
    <button class="tab-btn active" data-tab="all">Overall</button>
    <button class="tab-btn" data-tab="schedule">Schedule</button>
    <button class="tab-btn" data-tab="tasks">Tasks</button>
    <button class="tab-btn" data-tab="config">⚙ จัดกลุ่ม</button>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#0D2137;border:1px solid #64B5F6"></div>Food</div>
  <div class="legend-item"><div class="legend-dot" style="background:#0D2110;border:1px solid #81C784"></div>Store Use</div>
  <div class="legend-item"><div class="legend-dot" style="background:#1a0d2a;border:1px solid #CE93D8"></div>Bao Café</div>
  <div class="legend-item"><div class="legend-dot" style="background:#2a1800;border:1px solid #FFB74D"></div>Non Food</div>
  <div class="legend-item"><div class="legend-dot" style="background:#002a2a;border:1px solid #4DD0E1"></div>Life Style</div>
  <div class="legend-item"><div class="legend-dot" style="background:#2a0a1a;border:1px solid #F48FB1"></div>Pro</div>
  <div class="legend-item"><div class="legend-dot" style="background:#1a2a00;border:1px solid #AED581"></div>Chilled</div>
  <div class="legend-item"><div class="legend-dot" style="background:#263238"></div>เปิดร้าน</div>
  <div class="legend-item"><div class="legend-dot" style="background:#2a2200;border:1px solid #5a4a00"></div>Tasks</div>
  <div class="legend-item"><div class="legend-dot" style="background:#1a1000;border:1px solid #3a2800"></div>Grand Fair</div>
</div>

<div class="store-count" id="storeCount"></div>

<div class="main-layout">

  <!-- ซ้าย: detail panel -->
  <div class="detail-panel" id="detailPanel">
    <div class="detail-store-info" id="detailStoreInfo">
      <div class="detail-empty">เลือกร้านเพื่อดูรายละเอียด</div>
    </div>
    <div class="detail-fair" id="detailFair"></div>
    <div class="detail-timeline" id="detailTimeline"></div>
  </div>

  <div class="resizer" id="resizer"></div>

  <!-- ขวา: ปฏิทิน -->
  <div class="cal-side" id="calView">
    <div class="nav-bar">
      <button class="nav-btn" id="prevMonth">&#8249;</button>
      <div class="month-label" id="monthLabel"></div>
      <button class="nav-btn" id="nextMonth">&#8250;</button>
    </div>
    <div class="calendar">
      <div class="day-headers">
        <div class="day-header" style="background:#0d0d0d;"></div><div class="day-header sun">อา</div>
        <div class="day-header">จ</div>
        <div class="day-header">อ</div>
        <div class="day-header">พ</div>
        <div class="day-header">พฤ</div>
        <div class="day-header">ศ</div>
        <div class="day-header sat">ส</div>
      </div>
      <div class="cal-grid" id="calGrid">
        <div class="loading">กำลังโหลดข้อมูล...</div>
      </div>
    </div>
  </div>

  <!-- config view -->
  <div id="configView" style="display:none; flex:1; overflow-y:auto;">
    <div class="config-wrap">
      <div class="config-title">จัดกลุ่ม Schedule / Tasks</div>
      <table class="config-table">
        <thead><tr><th>รายการ</th><th>กลุ่ม</th></tr></thead>
        <tbody id="configBody"></tbody>
      </table>
    </div>
  </div>

</div>

<!-- Confirm popup -->
<div class="confirm-popup-bg" id="confirmPopupBg">
  <div class="confirm-popup">
    <p id="confirmMsg"></p>
    <div class="confirm-btns">
      <button class="confirm-yes" id="confirmYes">ยืนยัน</button>
      <button class="confirm-no" onclick="document.getElementById('confirmPopupBg').classList.remove('show')">ยกเลิก</button>
    </div>
  </div>
</div>

<div class="day-popup-bg" id="dayPopupBg">
  <div class="day-popup">
    <button class="day-popup-close" id="dayPopupClose">×</button>
    <div class="day-popup-title" id="dayPopupTitle"></div>
    <div id="dayPopupContent"></div>
  </div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-head">
      <div>
        <div class="modal-title" id="mTitle"></div>
        <div class="modal-sub" id="mSub"></div>
      </div>
      <button class="modal-close" id="modalClose">×</button>
    </div>
    <div id="mContent"></div>
  </div>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRo75-UkhXcDBNDjcw8SpyjTNZZq1w6mZoRUxYAYd1FO4sAQGMkuHzD4bx0CupUHFaGSMYwRsaQ4RoW/pub?gid=0&single=true&output=csv";
const THAI_MONTHS = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
const THAI_MONTHS_SHORT = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];

let allStores = [], currentTab = "all";
const today = new Date(); today.setHours(0,0,0,0);

function getWeekStart(d) { const x = new Date(d); x.setDate(x.getDate()-x.getDay()); x.setHours(0,0,0,0); return x; }
let viewStart = getWeekStart(today);

function parseDate(str) {
  if (!str || str.length < 10) return null;
  const p = str.substring(0,10).split("-");
  if (p.length !== 3) return null;
  return new Date(parseInt(p[0]), parseInt(p[1])-1, parseInt(p[2]));
}
function dateToStr(d) {
  if (!d) return "";
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function todayStr() { return dateToStr(today); }

const SCHEDULE_ITEMS = [
  { key: "PickDate_Food",              label: "จัด Food",       cls: "color-food-pick" },
  { key: "Food Delivery (D-4)",        label: "ส่ง Food",        cls: "color-food-del" },
  { key: "PickDate_Store Use",         label: "จัด Store Use",   cls: "color-store-pick" },
  { key: "Store Use Delivery (D-4)",   label: "ส่ง Store Use",   cls: "color-store-del" },
  { key: "PickDate_Bao Café",          label: "จัด Bao Café",    cls: "color-bao-pick" },
  { key: "Bao Café Delivery (D-4)",    label: "ส่ง Bao Café",    cls: "color-bao-del" },
  { key: "PickDate_Non Food",          label: "จัด Non Food",    cls: "color-nonfood-pick" },
  { key: "Non-Food Delivery (D-3)",    label: "ส่ง Non Food",    cls: "color-nonfood-del" },
  { key: "PickDate_Life Style",        label: "จัด Life Style",  cls: "color-life-pick" },
  { key: "Life Style Delivery (D-3)",  label: "ส่ง Life Style",  cls: "color-life-del" },
  { key: "PickDate_สินค้ารอบเก็บตก", label: "จัด เก็บตก",     cls: "color-pro-pick" },
  { key: "Pro Delivery (D-2)",         label: "ส่ง เก็บตก",     cls: "color-pro-del" },
  { key: "PickDate_Chilled",           label: "จัด Chilled",     cls: "color-chill-pick" },
  { key: "Chill Delivery (D-1)",       label: "ส่ง Chilled",     cls: "color-chill-del" },
  { key: "Grand Open Date",            label: "เปิดร้าน",        cls: "color-open", showName: true },
];

const TASK_ITEMS = [
  { key: "Submit OR First Lot (D-8)",  label: "Submit OR First Lot", cls: "color-task" },
  { key: "OOS Report to Commer (D-7)", label: "OOS Report",          cls: "color-task" },
  { key: "Commer Feedback (D-5)",      label: "Commer Feedback",     cls: "color-task" },
  { key: "Last Order HB Sell",         label: "Last Order HB",       cls: "color-task" },
  { key: "Set Parameter (D-2)",        label: "Set Parameter",       cls: "color-task" },
  { key: "Reassign TB2 (D+8)",         label: "Reassign TB2",        cls: "color-task" },
  { key: "Grand Open Date",            label: "เปิดร้าน",            cls: "color-open", showName: true },
  { key: "_lastorder_food",            label: "Last Order Food",     cls: "color-task", lastOrderFrom: "PickDate_Food" },
  { key: "_lastorder_store",           label: "Last Order Store Use",cls: "color-task", lastOrderFrom: "PickDate_Store Use" },
  { key: "_lastorder_bao",             label: "Last Order Bao Café", cls: "color-task", lastOrderFrom: "PickDate_Bao Café" },
  { key: "_lastorder_nonfood",         label: "Last Order Non Food", cls: "color-task", lastOrderFrom: "PickDate_Non Food" },
  { key: "_lastorder_life",            label: "Last Order Life Style",cls: "color-task", lastOrderFrom: "PickDate_Life Style" },
  { key: "_lastorder_pro",             label: "Last Order เก็บตก", cls: "color-task", lastOrderFrom: "PickDate_สินค้ารอบเก็บตก" },
  { key: "_lastorder_chilled",         label: "Last Order Chilled",  cls: "color-task", lastOrderFrom: "PickDate_Chilled" },
];

const categoryMap = {};
SCHEDULE_ITEMS.forEach(i => categoryMap[i.key] = "schedule");
TASK_ITEMS.forEach(i => categoryMap[i.key] = "tasks");

function parseCSV(text) {
  const lines = text.trim().split("\n");
  const headers = lines[0].split(",").map(h => h.replace(/"/g,"").trim());
  return lines.slice(1).map(line => {
    const vals = []; let cur = "", inQ = false;
    for (let c of line) {
      if (c==='"') inQ=!inQ;
      else if (c===',' && !inQ) { vals.push(cur.trim()); cur=""; }
      else cur+=c;
    }
    vals.push(cur.trim());
    const obj = {};
    headers.forEach((h,i) => obj[h] = vals[i]||"");
    return obj;
  });
}

function getFilteredStores() {
  const storeVal = document.getElementById("storeSelect").value;
  return allStores.filter(s => !storeVal || s["Nest Store Code"] === storeVal);

function getActiveItems() {
  if (currentTab === "schedule") return SCHEDULE_ITEMS;
  if (currentTab === "tasks") return TASK_ITEMS;
  // overall: ไม่แสดง last order items (_lastorder_*)
  return [...SCHEDULE_ITEMS, ...TASK_ITEMS.filter(i => !i.lastOrderFrom)];
}

function buildEventMap(stores) {
  const map = {};
  stores.forEach(store => {
    const openD = parseDate(store["Grand Open Date"]);
    if (openD) {
      for (let n = 0; n <= 4; n++) {
        const d = new Date(openD); d.setDate(d.getDate()+n);
        const k = dateToStr(d);
        if (!map[k]) map[k] = { events:[], fairType:null, grouped:{} };
        if (!map[k].fairType) map[k].fairType = "peak";
      }
      for (let n = 5; n <= 13; n++) {
        const d = new Date(openD); d.setDate(d.getDate()+n);
        const k = dateToStr(d);
        if (!map[k]) map[k] = { events:[], fairType:null, grouped:{} };
        if (!map[k].fairType) map[k].fairType = "normal";
      }
    }
    const seenKeys = new Set();
    getActiveItems().forEach(item => {
      let d;
      if (item.lastOrderFrom) {
        const pickD = parseDate(store[item.lastOrderFrom]);
        if (!pickD) return;
        d = new Date(pickD); d.setDate(d.getDate()-1);
      } else {
        d = parseDate(store[item.key]);
      }
      if (!d) return;
      const k = dateToStr(d);
      const dedupKey = k+"_"+item.key+"_"+(store["Nest Store Code"]||"");
      if (seenKeys.has(dedupKey)) return;
      seenKeys.add(dedupKey);
      if (!map[k]) map[k] = { events:[], fairType:null, grouped:{} };

      const isOpen = item.showName;
      if (isOpen) {
        // เปิดร้าน → ขึ้นแยกทีละร้านเหมือนเดิม
        map[k].events.push({ label: item.label, cls: item.cls, store, item });
      } else {
        // group ตาม label
        if (!map[k].grouped[item.label]) {
          map[k].grouped[item.label] = { label: item.label, cls: item.cls, stores: [], item };
        }
        map[k].grouped[item.label].stores.push(store);
      }
    });
  });

  // แปลง grouped → events
  Object.values(map).forEach(day => {
    Object.values(day.grouped).forEach(g => {
      const count = g.stores.length;
      const displayLabel = count > 1 ? `${g.label} +${count}` : g.label;
      day.events.unshift({ label: displayLabel, cls: g.cls, store: g.stores[0], item: g.item, allStores: g.stores, isGrouped: count > 1 });
    });
  });

  return map;
}

function renderCalendar() {
  const stores = getFilteredStores();
  const eventMap = buildEventMap(stores);
  const grid = document.getElementById("calGrid");
  grid.innerHTML = "";

  const endDate = new Date(viewStart); endDate.setDate(endDate.getDate()+34);
  const startM = THAI_MONTHS[viewStart.getMonth()];
  const endM = THAI_MONTHS[endDate.getMonth()];
  document.getElementById("monthLabel").textContent = viewStart.getMonth() === endDate.getMonth()
    ? `${startM} ${viewStart.getFullYear()}`
    : `${startM} – ${endM} ${endDate.getFullYear()}`;
  document.getElementById("storeCount").textContent = `แสดง ${stores.length} ร้านที่ยังไม่เปิด`;

  const tStr = todayStr();
  const totalCells = 35;
  const cellH = `calc((100vh - 160px - 5 * 20px) / 5)`;

  for (let i = 0; i < totalCells; i++) {
    if (i % 7 === 0) {
      const weekD = new Date(viewStart); weekD.setDate(weekD.getDate()+i);
      const weekEnd = new Date(weekD); weekEnd.setDate(weekEnd.getDate()+6);
      let barText = weekD.getMonth() === weekEnd.getMonth()
        ? THAI_MONTHS[weekD.getMonth()]+" "+weekD.getFullYear()
        : THAI_MONTHS[weekD.getMonth()]+" – "+THAI_MONTHS[weekEnd.getMonth()]+" "+weekEnd.getFullYear();
      const bar = document.createElement("div");
      bar.className = "week-month-bar "+(weekD.getMonth()%2===0?"month-even":"month-odd");
      bar.textContent = barText;
      grid.appendChild(bar);
    }

    const cell = document.createElement("div");
    cell.className = "cal-cell";

    const curDate = new Date(viewStart); curDate.setDate(curDate.getDate()+i);
    const dateStr = dateToStr(curDate);
    const dayNum = curDate.getDate();

    cell.classList.add(curDate.getMonth()%2===0?"month-even":"month-odd");
    if (dateStr === tStr) cell.classList.add("is-today");

    const info = eventMap[dateStr];
    if (info && info.fairType) cell.classList.add(info.fairType==="peak"?"fair-peak":"fair-normal");
    if (curDate.getDate()===1) cell.classList.add("new-month-border");

    if (i % 7 === 0) {
      const weekD = new Date(viewStart); weekD.setDate(weekD.getDate()+i);
      const weekEnd = new Date(weekD); weekEnd.setDate(weekEnd.getDate()+6);
      const MONTHS_SHORT = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
      const mCol = document.createElement("div");
      mCol.className = "month-col";
      if (weekD.getMonth() === weekEnd.getMonth()) {
        mCol.textContent = MONTHS_SHORT[weekD.getMonth()];
      } else {
        mCol.textContent = MONTHS_SHORT[weekD.getMonth()] + "/" + MONTHS_SHORT[weekEnd.getMonth()];
      }
      grid.appendChild(mCol);
    }

    const numEl = document.createElement("div");
    numEl.className = "day-num";
    const dow = i%7;
    if (dow===0) numEl.classList.add("sun");
    if (dow===6) numEl.classList.add("sat");
    if (dateStr===tStr) numEl.classList.add("today");
    numEl.textContent = dayNum;
    cell.appendChild(numEl);

    if (info) {
      const maxShow = 3;
      info.events.slice(0, maxShow).forEach(ev => {
        const el = document.createElement("div");
        el.className = "event "+ev.cls;
        el.textContent = ev.item && ev.item.showName ? ev.label+": "+ev.store["Store Name"] : ev.label;
        el.title = ev.store["Store Name"];
        el.addEventListener("click", () => {
          const isTask = ev.item && TASK_ITEMS.some(t => t.label === ev.item.label || (t.lastOrderFrom && ev.item.lastOrderFrom));
          const isOpen = ev.item && ev.item.showName;
          if (isTask && !isOpen) {
            const codes = ev.allStores ? ev.allStores.map(s=>s["Nest Store Code"]) : [ev.store["Nest Store Code"]];
            openMultiStorePanel(codes, ev.item.label);
          } else if (!isTask) {
            selectStoreScheduleOnly(ev.store);
          } else {
            selectStore(ev.store);
          }
        });
        cell.appendChild(el);
      });
      if (info.events.length > maxShow) {
        const more = document.createElement("div");
        more.className = "event-more";
        more.textContent = "+"+(info.events.length-maxShow)+" more";
        const allEvs = info.events;
        more.addEventListener("click", () => showDayPopup(dateStr, allEvs));
        cell.appendChild(more);
      }
    }
    grid.appendChild(cell);
  }
}

  const makeRow = (item, isTask=false) => {
    let d;

      d = new Date(pd); d.setDate(d.getDate()-1);

    const dateLabel = `${d.getDate()} ${THAI_MONTHS_SHORT[d.getMonth()]}`;

        <input type="checkbox" class="task-cb" ${isDone?"checked":""} onchange="toggleTaskDone('${store["Nest Store Code"]}','${item.label}',this)">

    return `<div class="tl-row"><div class="tl-date">${dateLabel}</div><div class="${cls}">${item.label}</div></div>`;

function showDayPopup(dateStr, events) {
  const p = dateStr.split("-");
  const d = new Date(parseInt(p[0]), parseInt(p[1])-1, parseInt(p[2]));
  document.getElementById("dayPopupTitle").textContent = `${d.getDate()} ${THAI_MONTHS_SHORT[d.getMonth()]} ${d.getFullYear()}`;

  // group events ที่ label เหมือนกัน
  const grouped = {};
  events.forEach(ev => {
    const key = ev.label;
    if (!grouped[key]) grouped[key] = { label: ev.label, cls: ev.cls, stores: [], item: ev.item };
    grouped[key].stores.push(ev.store);
  });

  const html = Object.values(grouped).map(g => {
    const isTask = g.item && (TASK_ITEMS.some(t => t.label === g.label));
    const isOpen = g.item && g.item.showName;
    const count = g.stores.length;
    const labelText = count > 1 ? `${g.label} +${count}` : g.label + (isOpen ? ": " + g.stores[0]["Store Name"] : " — " + g.stores[0]["Store Name"]);

    if (isOpen) {
      // เปิดร้าน → selectStore ปกติ
      return `<div class="event ${g.cls}" style="margin-bottom:4px;cursor:pointer" onclick="selectStore(allStores.find(s=>s['Nest Store Code']==='${g.stores[0]['Nest Store Code']}'));document.getElementById('dayPopupBg').classList.remove('show');">${labelText}</div>`;
    } else if (isTask) {
      // task → เปิด multi-store panel + filter Tasks
      return `<div class="event color-task" style="margin-bottom:4px;cursor:pointer" onclick="openMultiStorePanel(${JSON.stringify(g.stores.map(s=>s['Nest Store Code']))}, '${g.label}');document.getElementById('dayPopupBg').classList.remove('show');">${labelText}</div>`;
    } else {
      // schedule → selectStore ปกติ ไม่ show tasks
      return `<div class="event ${g.cls}" style="margin-bottom:4px;cursor:pointer" onclick="selectStoreScheduleOnly(allStores.find(s=>s['Nest Store Code']==='${g.stores[0]['Nest Store Code']}'));document.getElementById('dayPopupBg').classList.remove('show');">${labelText}</div>`;
    }
  }).join("");

  document.getElementById("dayPopupContent").innerHTML = html;
  document.getElementById("dayPopupBg").classList.add("show");
}

    });

const TASK_DONE_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRo75-UkhXcDBNDjcw8SpyjTNZZq1w6mZoRUxYAYd1FO4sAQGMkuHzD4bx0CupUHFaGSMYwRsaQ4RoW/pub?gid=1822590170&single=true&output=csv";

function toggleTaskDone(storeCode, taskLabel, checkbox) {
  if (!currentUser) return;
  const taskCol = TASK_COL_MAP[taskLabel];
  if (!taskCol) return;
  const isDone = checkbox.checked;
  const msg = isDone
    ? `ยืนยันว่า "${taskLabel}" ทำเสร็จแล้ว?`
    : `ยืนยันยกเลิก "${taskLabel}"?`;

  checkbox.checked = !isDone; // revert ก่อน รอ confirm

  showConfirm(msg, async () => {
    checkbox.checked = isDone;
    try {
      await fetch(WEBAPP_URL, {
        method: "POST",
        body: JSON.stringify({
          action: isDone ? "set" : "unset",
          store_code: storeCode,
          task_col: taskCol,
          updated_by: currentUser
        })
      });
      // อัปเดต local map
      if (!taskDoneMap[storeCode]) taskDoneMap[storeCode] = {};
      taskDoneMap[storeCode][taskCol] = isDone ? currentUser : "";
      // re-render detail
      const store = allStores.find(s => s["Nest Store Code"] === storeCode);
      if (store) updateDetailPanel(store);
    } catch(e) {
      console.error(e);
    }
  });
}

async function loadTaskDone() {
  try {
    const res = await fetch(TASK_DONE_CSV_URL + "&t=" + Date.now());
    const text = await res.text();
    const rows = parseCSV(text);
    taskDoneMap = {};
    rows.forEach(r => {
      if (r["store_code"]) taskDoneMap[r["store_code"]] = r;
    });
  } catch(e) {
    console.log("task_done load failed:", e);
  }
}

async function loadData() {
  try {
    const res = await fetch(CSV_URL+"&t="+Date.now());
    const text = await res.text();
    allStores = parseCSV(text).filter(s=>s["Store Name"]);
    const storeSel = document.getElementById("storeSelect");
    allStores.forEach(s => {
      const opt = document.createElement("option");
      opt.value = s["Nest Store Code"];
      opt.textContent = s["Nest Store Code"]+" - "+s["Store Name"];
      storeSel.appendChild(opt);
    });
    await loadTaskDone();
    renderCalendar();
    renderConfig();
  } catch(e) {
    document.getElementById("calGrid").innerHTML = '<div class="loading">โหลดข้อมูลไม่ได้ กรุณา refresh</div>';
  }
}

document.getElementById("prevMonth").addEventListener("click", ()=>{ viewStart.setDate(viewStart.getDate()-7); renderCalendar(); });
document.getElementById("nextMonth").addEventListener("click", ()=>{ viewStart.setDate(viewStart.getDate()+7); renderCalendar(); });

let scrollCooldown = false;
document.addEventListener("wheel", (e) => {
  e.preventDefault();
  if (scrollCooldown) return;
  scrollCooldown = true;
  setTimeout(()=>scrollCooldown=false, 300);
  viewStart.setDate(viewStart.getDate()+(e.deltaY>0?7:-7));
  renderCalendar();
}, { passive: false });

document.getElementById("storeSelect").addEventListener("change", function(){
  const store = allStores.find(s=>s["Nest Store Code"]===this.value)||null;
  updateDetailPanel(store);
  if (store && store["Grand Open Date"]) {
    const openD = parseDate(store["Grand Open Date"]);
    if (openD) { viewStart = new Date(getWeekStart(openD)); viewStart.setDate(viewStart.getDate()-14); }
  }
  renderCalendar();
});

document.getElementById("resetBtn").addEventListener("click", ()=>{
  document.getElementById("storeSelect").value = "";
  updateDetailPanel(null);
  viewStart = getWeekStart(today);
  renderCalendar();
});

document.querySelectorAll(".tab-btn").forEach(btn=>{
  btn.addEventListener("click", function(){
    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
    this.classList.add("active");
    const tab = this.dataset.tab;
    if (tab==="config") {
      document.getElementById("calView").style.display="none";
      document.getElementById("configView").style.display="block";
    } else {
      currentTab=tab;
      document.getElementById("calView").style.display="flex";
      document.getElementById("configView").style.display="none";
      renderCalendar();
    }
  });
});

document.getElementById("dayPopupClose").addEventListener("click",()=>document.getElementById("dayPopupBg").classList.remove("show"));
document.getElementById("dayPopupBg").addEventListener("click",e=>{ if(e.target===document.getElementById("dayPopupBg")) document.getElementById("dayPopupBg").classList.remove("show"); });
document.getElementById("modalClose").addEventListener("click",()=>document.getElementById("modalBg").classList.remove("show"));
document.getElementById("modalBg").addEventListener("click",e=>{ if(e.target===document.getElementById("modalBg")) document.getElementById("modalBg").classList.remove("show"); });

loadData();

const resizer = document.getElementById('resizer');
const panel = document.querySelector('.detail-panel');
let isResizing = false;
resizer.addEventListener('mousedown', (e) => {
  isResizing = true;
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
});
document.addEventListener('mousemove', (e) => {
  if (!isResizing) return;
  const w = e.clientX;
  if (w >= 120 && w <= 500) panel.style.width = w + 'px';
});
document.addEventListener('mouseup', () => {
  isResizing = false;
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
});
</script>
</body>
</html>
