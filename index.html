<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CJX First Lot Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Sarabun', sans-serif; background: #111; color: #ccc; font-size: 14px; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

.header { background: #0d0d0d; color: white; padding: 10px 20px; display: flex; align-items: center; border-bottom: 1px solid #222; flex-shrink: 0; }
.header-title { font-size: 15px; font-weight: 500; }
.header-sub { font-size: 11px; opacity: 0.4; margin-top: 1px; }

.top-bar { background: #161616; padding: 8px 16px; border-bottom: 1px solid #222; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; flex-shrink: 0; }
.top-bar select { border: 1px solid #333; border-radius: 6px; padding: 5px 10px; font-size: 13px; font-family: 'Sarabun', sans-serif; outline: none; background: #1e1e1e; color: #ccc; }
.top-bar select:focus { border-color: #5c6bc0; }
.view-tabs { display: flex; gap: 4px; margin-left: auto; }
.tab-btn { padding: 5px 12px; border: 1px solid #333; border-radius: 6px; background: #1e1e1e; cursor: pointer; font-size: 13px; font-family: 'Sarabun', sans-serif; color: #888; }
.tab-btn.active { background: #5c6bc0; color: white; border-color: #5c6bc0; }
.reset-btn { padding: 5px 12px; border: 1px solid #c62828; border-radius: 6px; background: #1e1e1e; cursor: pointer; font-size: 13px; font-family: 'Sarabun', sans-serif; color: #ef5350; }
.reset-btn:hover { background: #2a0a0a; }

.legend { background: #161616; padding: 6px 16px; border-bottom: 1px solid #222; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; flex-shrink: 0; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #555; }
.legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

.store-count { font-size: 11px; color: #555; padding: 4px 16px; background: #161616; border-bottom: 1px solid #222; flex-shrink: 0; }

.main-layout { display: flex; flex: 1; overflow: hidden; }

/* ซ้าย 30% detail panel */
.detail-panel { width: 20%; border-right: 1px solid #222; display: flex; flex-direction: column; background: #141414; overflow: hidden; flex-shrink: 0; }
.detail-store-info { background: #1a1a1a; padding: 12px 14px; border-bottom: 1px solid #222; flex: 0 0 50%; overflow-y: auto; }
.detail-store-name { font-size: 15px; font-weight: 500; color: #fff; margin-bottom: 6px; }
.detail-store-meta { font-size: 12px; color: #bbb; margin-bottom: 8px; line-height: 1.6; }
.detail-chips { display: flex; gap: 6px; flex-wrap: wrap; }
.detail-chip { font-size: 11px; padding: 3px 8px; border-radius: 4px; line-height: 1.5; }
.detail-timeline { padding: 10px 14px; overflow-y: auto; flex: 0 0 50%; border-top: 1px solid #222; }
.tl-section { font-size: 10px; font-weight: 500; color: #666; letter-spacing: 0.5px; text-transform: uppercase; margin: 8px 0 5px; }
.tl-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.tl-date { width: 52px; font-size: 11px; color: #aaa; flex-shrink: 0; }
.tl-event { border-radius: 3px; padding: 2px 7px; font-size: 11px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
.tl-event:hover { opacity: 0.8; }
.detail-empty { color: #666; font-size: 12px; padding: 20px 0; text-align: center; }

/* ขวา 70% ปฏิทิน */
.cal-side { width: 80%; display: flex; flex-direction: column; overflow: hidden; }
.nav-bar { background: #0d0d0d; padding: 6px 16px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.nav-btn { background: #1e1e1e; border: 1px solid #333; border-radius: 6px; padding: 4px 12px; cursor: pointer; font-size: 16px; color: #888; }
.nav-btn:hover { background: #2a2a2a; }
.month-label { font-size: 14px; font-weight: 500; color: #ccc; min-width: 160px; }

.calendar { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-height: 0; }
.day-headers { display: grid; grid-template-columns: repeat(7,1fr); background: #0d0d0d; border-bottom: 1px solid #222; flex-shrink: 0; }
.day-header { padding: 6px; text-align: center; font-size: 12px; font-weight: 500; color: #555; }
.day-header.sun { color: #e53935; }
.day-header.sat { color: #1e88e5; }

.cal-grid { display: flex; flex-wrap: wrap; flex: 1; align-content: stretch; }
.week-month-bar { width: 100%; }
.cal-cell { width: calc(100% / 7); flex: none; box-sizing: border-box; }
.cal-cell { border-right: 0.5px solid #1e1e1e; border-bottom: 0.5px solid #1e1e1e; padding: 5px; overflow: hidden; height: calc((100% - 5 * 20px) / 5); box-sizing: border-box; }


.month-even { background: #161616; }
.month-odd  { background: #121212; }
.cal-cell.fair-peak  { background: #1a1000 !important; }
.cal-cell.fair-normal { background: #141000 !important; }
.cal-cell.is-today   { background: #1a0000 !important; outline: 2px solid #e53935; outline-offset: -2px; }

.week-month-bar { width: 100%; padding: 2px 8px; font-size: 10px; font-weight: 500; height: 20px; line-height: 16px; box-sizing: border-box; }
.week-month-bar.month-even { background: #0d2010; color: #66BB6A; }
.week-month-bar.month-odd  { background: #1a0d2a; color: #CE93D8; }
.new-month-border { border-left: 2px solid #5c6bc0 !important; }

.day-num { font-size: 13px; font-weight: 500; color: #666; margin-bottom: 3px; display: inline-flex; width: 22px; height: 22px; align-items: center; justify-content: center; border-radius: 50%; }
.day-num.today { background: #e53935 !important; color: white !important; font-weight: 700 !important; }
.day-num.sun { color: #e53935; }
.day-num.sat { color: #1e88e5; }
.other-month .day-num { color: #333 !important; }

.event { border-radius: 3px; padding: 1px 5px; font-size: 11px; margin-bottom: 2px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; opacity: 0.9; }
.event:hover { opacity: 1; }
.event-more { font-size: 11px; color: #5c6bc0; padding: 1px 4px; cursor: pointer; font-weight: 500; }
.event-more:hover { text-decoration: underline; }

.color-food-pick    { background: #0D2137; color: #64B5F6; }
.color-food-del     { background: #0a1a2e; color: #90CAF9; border-left: 2px solid #64B5F6; }
.color-store-pick   { background: #0D2110; color: #81C784; }
.color-store-del    { background: #081a0a; color: #A5D6A7; border-left: 2px solid #81C784; }
.color-bao-pick     { background: #1a0d2a; color: #CE93D8; }
.color-bao-del      { background: #130820; color: #E1BEE7; border-left: 2px solid #CE93D8; }
.color-nonfood-pick { background: #2a1800; color: #FFB74D; }
.color-nonfood-del  { background: #1e1000; color: #FFD54F; border-left: 2px solid #FFB74D; }
.color-life-pick    { background: #002a2a; color: #4DD0E1; }
.color-life-del     { background: #001e1e; color: #80DEEA; border-left: 2px solid #4DD0E1; }
.color-pro-pick     { background: #2a0a1a; color: #F48FB1; }
.color-pro-del      { background: #1e0612; color: #F8BBD0; border-left: 2px solid #F48FB1; }
.color-chill-pick   { background: #1a2a00; color: #AED581; }
.color-chill-del    { background: #121e00; color: #DCEDC8; border-left: 2px solid #AED581; }
.color-open         { background: #263238; color: #ECEFF1; }
.color-task         { background: #2a2200; color: #FFD54F; border: 1px solid #5a4a00; }

.loading { text-align: center; padding: 50px; color: #444; font-size: 14px; }

.day-popup-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 300; align-items: center; justify-content: center; }
.day-popup-bg.show { display: flex; }
.day-popup { background: #1e1e1e; border: 1px solid #333; border-radius: 10px; padding: 16px; min-width: 240px; max-width: 320px; max-height: 70vh; overflow-y: auto; }
.day-popup-title { font-size: 14px; font-weight: 500; margin-bottom: 10px; color: #fff; }
.day-popup-close { float: right; background: none; border: none; font-size: 18px; cursor: pointer; color: #555; margin-top: -4px; }

.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; align-items: center; justify-content: center; }
.modal-bg.show { display: flex; }
.modal { background: #1e1e1e; border: 1px solid #333; border-radius: 12px; padding: 20px; max-width: 460px; width: 92%; max-height: 85vh; overflow-y: auto; }
.modal-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
.modal-title { font-size: 16px; font-weight: 500; color: #fff; }
.modal-sub { font-size: 12px; color: #555; margin-top: 2px; }
.modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: #555; line-height: 1; }
.modal-section { font-size: 11px; font-weight: 500; color: #444; letter-spacing: 0.5px; margin: 12px 0 6px; text-transform: uppercase; }
.modal-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 0.5px solid #222; font-size: 13px; }
.modal-row:last-child { border-bottom: none; }
.modal-key { color: #555; }
.modal-val { font-weight: 500; color: #ccc; }

.config-wrap { padding: 14px; background: #111; }
.config-title { font-size: 14px; font-weight: 500; margin-bottom: 10px; color: #ccc; }
.config-table { width: 100%; border-collapse: collapse; background: #1e1e1e; border-radius: 10px; overflow: hidden; border: 1px solid #333; }
.config-table th { background: #161616; padding: 10px 14px; text-align: left; font-size: 12px; color: #555; font-weight: 500; }
.config-table td { padding: 8px 14px; border-top: 0.5px solid #222; font-size: 13px; color: #aaa; }
.config-table select { border: 1px solid #333; border-radius: 4px; padding: 3px 8px; font-size: 12px; font-family: 'Sarabun', sans-serif; background: #111; color: #ccc; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">CJX First Lot Calendar</div>
    <div class="header-sub">ปฏิทินร้านใหม่ — อัปเดตอัตโนมัติทุกวัน</div>
  </div>
</div>

<div class="top-bar">
  <select id="storeSelect" style="width:260px">
    <option value="">-- ทุกร้าน --</option>
  </select>
  <button class="reset-btn" id="resetBtn">↺ Reset</button>
  <div class="view-tabs">
    <button class="tab-btn active" data-tab="all">Overall</button>
    <button class="tab-btn" data-tab="schedule">Schedule</button>
    <button class="tab-btn" data-tab="tasks">Tasks</button>
    <button class="tab-btn" data-tab="config">⚙ จัดกลุ่ม</button>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#0D2137;border:1px solid #64B5F6"></div>Food</div>
  <div class="legend-item"><div class="legend-dot" style="background:#0D2110;border:1px solid #81C784"></div>Store Use</div>
  <div class="legend-item"><div class="legend-dot" style="background:#1a0d2a;border:1px solid #CE93D8"></div>Bao Café</div>
  <div class="legend-item"><div class="legend-dot" style="background:#2a1800;border:1px solid #FFB74D"></div>Non Food</div>
  <div class="legend-item"><div class="legend-dot" style="background:#002a2a;border:1px solid #4DD0E1"></div>Life Style</div>
  <div class="legend-item"><div class="legend-dot" style="background:#2a0a1a;border:1px solid #F48FB1"></div>Pro</div>
  <div class="legend-item"><div class="legend-dot" style="background:#1a2a00;border:1px solid #AED581"></div>Chilled</div>
  <div class="legend-item"><div class="legend-dot" style="background:#263238"></div>เปิดร้าน</div>
  <div class="legend-item"><div class="legend-dot" style="background:#2a2200;border:1px solid #5a4a00"></div>Tasks</div>
  <div class="legend-item"><div class="legend-dot" style="background:#1a1000;border:1px solid #3a2800"></div>Grand Fair</div>
</div>

<div class="store-count" id="storeCount"></div>

<div class="main-layout">

  <!-- ซ้าย: detail panel -->
  <div class="detail-panel" id="detailPanel">
    <div class="detail-store-info" id="detailStoreInfo">
      <div class="detail-empty">เลือกร้านเพื่อดูรายละเอียด</div>
    </div>
    <div class="detail-timeline" id="detailTimeline"></div>
  </div>

  <!-- ขวา: ปฏิทิน -->
  <div class="cal-side" id="calView">
    <div class="nav-bar">
      <button class="nav-btn" id="prevMonth">&#8249;</button>
      <div class="month-label" id="monthLabel"></div>
      <button class="nav-btn" id="nextMonth">&#8250;</button>
    </div>
    <div class="calendar">
      <div class="day-headers">
        <div class="day-header sun">อา</div>
        <div class="day-header">จ</div>
        <div class="day-header">อ</div>
        <div class="day-header">พ</div>
        <div class="day-header">พฤ</div>
        <div class="day-header">ศ</div>
        <div class="day-header sat">ส</div>
      </div>
      <div class="cal-grid" id="calGrid">
        <div class="loading">กำลังโหลดข้อมูล...</div>
      </div>
    </div>
  </div>

  <!-- config view -->
  <div id="configView" style="display:none; flex:1; overflow-y:auto;">
    <div class="config-wrap">
      <div class="config-title">จัดกลุ่ม Schedule / Tasks</div>
      <table class="config-table">
        <thead><tr><th>รายการ</th><th>กลุ่ม</th></tr></thead>
        <tbody id="configBody"></tbody>
      </table>
    </div>
  </div>

</div>

<div class="day-popup-bg" id="dayPopupBg">
  <div class="day-popup">
    <button class="day-popup-close" id="dayPopupClose">×</button>
    <div class="day-popup-title" id="dayPopupTitle"></div>
    <div id="dayPopupContent"></div>
  </div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-head">
      <div>
        <div class="modal-title" id="mTitle"></div>
        <div class="modal-sub" id="mSub"></div>
      </div>
      <button class="modal-close" id="modalClose">×</button>
    </div>
    <div id="mContent"></div>
  </div>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRo75-UkhXcDBNDjcw8SpyjTNZZq1w6mZoRUxYAYd1FO4sAQGMkuHzD4bx0CupUHFaGSMYwRsaQ4RoW/pub?gid=0&single=true&output=csv";
const THAI_MONTHS = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
const THAI_MONTHS_SHORT = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];

let allStores = [], currentTab = "all";
const today = new Date(); today.setHours(0,0,0,0);

function getWeekStart(d) { const x = new Date(d); x.setDate(x.getDate()-x.getDay()); x.setHours(0,0,0,0); return x; }
let viewStart = getWeekStart(today);

function parseDate(str) {
  if (!str || str.length < 10) return null;
  const p = str.substring(0,10).split("-");
  if (p.length !== 3) return null;
  return new Date(parseInt(p[0]), parseInt(p[1])-1, parseInt(p[2]));
}
function dateToStr(d) {
  if (!d) return "";
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function todayStr() { return dateToStr(today); }

const SCHEDULE_ITEMS = [
  { key: "PickDate_Food",              label: "จัด Food",       cls: "color-food-pick" },
  { key: "Food Delivery (D-4)",        label: "ส่ง Food",        cls: "color-food-del" },
  { key: "PickDate_Store Use",         label: "จัด Store Use",   cls: "color-store-pick" },
  { key: "Store Use Delivery (D-4)",   label: "ส่ง Store Use",   cls: "color-store-del" },
  { key: "PickDate_Bao Café",          label: "จัด Bao Café",    cls: "color-bao-pick" },
  { key: "Bao Café Delivery (D-4)",    label: "ส่ง Bao Café",    cls: "color-bao-del" },
  { key: "PickDate_Non Food",          label: "จัด Non Food",    cls: "color-nonfood-pick" },
  { key: "Non-Food Delivery (D-3)",    label: "ส่ง Non Food",    cls: "color-nonfood-del" },
  { key: "PickDate_Life Style",        label: "จัด Life Style",  cls: "color-life-pick" },
  { key: "Life Style Delivery (D-3)",  label: "ส่ง Life Style",  cls: "color-life-del" },
  { key: "PickDate_สินค้ารอบเก็บตก", label: "จัด Pro",         cls: "color-pro-pick" },
  { key: "Pro Delivery (D-2)",         label: "ส่ง Pro",         cls: "color-pro-del" },
  { key: "PickDate_Chilled",           label: "จัด Chilled",     cls: "color-chill-pick" },
  { key: "Chill Delivery (D-1)",       label: "ส่ง Chilled",     cls: "color-chill-del" },
  { key: "Grand Open Date",            label: "เปิดร้าน",        cls: "color-open", showName: true },
];

const TASK_ITEMS = [
  { key: "Submit OR First Lot (D-8)",  label: "Submit OR First Lot", cls: "color-task" },
  { key: "OOS Report to Commer (D-7)", label: "OOS Report",          cls: "color-task" },
  { key: "Commer Feedback (D-5)",      label: "Commer Feedback",     cls: "color-task" },
  { key: "Last Order HB Sell",         label: "Last Order HB",       cls: "color-task" },
  { key: "Set Parameter (D-2)",        label: "Set Parameter",       cls: "color-task" },
  { key: "Reassign TB2 (D+8)",         label: "Reassign TB2",        cls: "color-task" },
  { key: "Grand Open Date",            label: "เปิดร้าน",            cls: "color-open", showName: true },
];

const categoryMap = {};
SCHEDULE_ITEMS.forEach(i => categoryMap[i.key] = "schedule");
TASK_ITEMS.forEach(i => categoryMap[i.key] = "tasks");

function parseCSV(text) {
  const lines = text.trim().split("\n");
  const headers = lines[0].split(",").map(h => h.replace(/"/g,"").trim());
  return lines.slice(1).map(line => {
    const vals = []; let cur = "", inQ = false;
    for (let c of line) {
      if (c==='"') inQ=!inQ;
      else if (c===',' && !inQ) { vals.push(cur.trim()); cur=""; }
      else cur+=c;
    }
    vals.push(cur.trim());
    const obj = {};
    headers.forEach((h,i) => obj[h] = vals[i]||"");
    return obj;
  });
}

function getFilteredStores() {
  const storeVal = document.getElementById("storeSelect").value;
  return allStores.filter(s => !storeVal || s["Nest Store Code"] === storeVal);
}

function getActiveItems() {
  if (currentTab === "schedule") return SCHEDULE_ITEMS;
  if (currentTab === "tasks") return TASK_ITEMS;
  return [...SCHEDULE_ITEMS, ...TASK_ITEMS];
}

function buildEventMap(stores) {
  const map = {};
  stores.forEach(store => {
    const openD = parseDate(store["Grand Open Date"]);
    if (openD) {
      for (let n = 0; n <= 4; n++) {
        const d = new Date(openD); d.setDate(d.getDate()+n);
        const k = dateToStr(d);
        if (!map[k]) map[k] = { events:[], fairType:null };
        if (!map[k].fairType) map[k].fairType = "peak";
      }
      for (let n = 5; n <= 13; n++) {
        const d = new Date(openD); d.setDate(d.getDate()+n);
        const k = dateToStr(d);
        if (!map[k]) map[k] = { events:[], fairType:null };
        if (!map[k].fairType) map[k].fairType = "normal";
      }
    }
    const seenKeys = new Set();
    getActiveItems().forEach(item => {
      const d = parseDate(store[item.key]);
      if (!d) return;
      const k = dateToStr(d);
      const dedupKey = k+"_"+item.key+"_"+(store["Nest Store Code"]||"");
      if (seenKeys.has(dedupKey)) return;
      seenKeys.add(dedupKey);
      if (!map[k]) map[k] = { events:[], fairType:null };
      map[k].events.push({ label: item.label, cls: item.cls, store, item });
    });
  });
  return map;
}

function renderCalendar() {
  const stores = getFilteredStores();
  const eventMap = buildEventMap(stores);
  const grid = document.getElementById("calGrid");
  grid.innerHTML = "";

  const endDate = new Date(viewStart); endDate.setDate(endDate.getDate()+34);
  const startM = THAI_MONTHS[viewStart.getMonth()];
  const endM = THAI_MONTHS[endDate.getMonth()];
  document.getElementById("monthLabel").textContent = viewStart.getMonth() === endDate.getMonth()
    ? `${startM} ${viewStart.getFullYear()}`
    : `${startM} – ${endM} ${endDate.getFullYear()}`;
  document.getElementById("storeCount").textContent = `แสดง ${stores.length} ร้านที่ยังไม่เปิด`;

  const tStr = todayStr();
  const totalCells = 35;
  const cellH = `calc((100vh - 160px - 5 * 20px) / 5)`;

  for (let i = 0; i < totalCells; i++) {
    if (i % 7 === 0) {
      const weekD = new Date(viewStart); weekD.setDate(weekD.getDate()+i);
      const weekEnd = new Date(weekD); weekEnd.setDate(weekEnd.getDate()+6);
      let barText = weekD.getMonth() === weekEnd.getMonth()
        ? THAI_MONTHS[weekD.getMonth()]+" "+weekD.getFullYear()
        : THAI_MONTHS[weekD.getMonth()]+" – "+THAI_MONTHS[weekEnd.getMonth()]+" "+weekEnd.getFullYear();
      const bar = document.createElement("div");
      bar.className = "week-month-bar "+(weekD.getMonth()%2===0?"month-even":"month-odd");
      bar.textContent = barText;
      grid.appendChild(bar);
    }

    const cell = document.createElement("div");
    cell.className = "cal-cell";

    const curDate = new Date(viewStart); curDate.setDate(curDate.getDate()+i);
    const dateStr = dateToStr(curDate);
    const dayNum = curDate.getDate();

    cell.classList.add(curDate.getMonth()%2===0?"month-even":"month-odd");
    if (dateStr === tStr) cell.classList.add("is-today");

    const info = eventMap[dateStr];
    if (info && info.fairType) cell.classList.add(info.fairType==="peak"?"fair-peak":"fair-normal");
    if (curDate.getDate()===1) cell.classList.add("new-month-border");

    const numEl = document.createElement("div");
    numEl.className = "day-num";
    const dow = i%7;
    if (dow===0) numEl.classList.add("sun");
    if (dow===6) numEl.classList.add("sat");
    if (dateStr===tStr) numEl.classList.add("today");
    numEl.textContent = dayNum;
    cell.appendChild(numEl);

    if (info) {
      const maxShow = 3;
      info.events.slice(0, maxShow).forEach(ev => {
        const el = document.createElement("div");
        el.className = "event "+ev.cls;
        el.textContent = ev.item && ev.item.showName ? ev.label+": "+ev.store["Store Name"] : ev.label;
        el.title = ev.store["Store Name"];
        el.addEventListener("click", () => selectStore(ev.store));
        cell.appendChild(el);
      });
      if (info.events.length > maxShow) {
        const more = document.createElement("div");
        more.className = "event-more";
        more.textContent = "+"+(info.events.length-maxShow)+" more";
        const allEvs = info.events;
        more.addEventListener("click", () => showDayPopup(dateStr, allEvs));
        cell.appendChild(more);
      }
    }
    grid.appendChild(cell);
  }
}

function showModal(store) {
  document.getElementById("mTitle").textContent = store["Store Name"];
  document.getElementById("mSub").textContent = store["Nest Store Code"]+" · DC: "+store["DC Code"]+" · Layout: "+(store["Store Layout"]||"-");
  const schedRows = SCHEDULE_ITEMS.map(i=>`<div class="modal-row"><span class="modal-key">${i.label}</span><span class="modal-val">${store[i.key]||"-"}</span></div>`).join("");
  const taskRows = TASK_ITEMS.filter(i=>i.key!=="Grand Open Date").map(i=>`<div class="modal-row"><span class="modal-key">${i.label}</span><span class="modal-val">${store[i.key]||"-"}</span></div>`).join("");
  document.getElementById("mContent").innerHTML = `<div class="modal-section">Schedule</div>${schedRows}<div class="modal-section">Tasks</div>${taskRows}`;
  document.getElementById("modalBg").classList.add("show");
}

function updateDetailPanel(store) {
  const infoEl = document.getElementById("detailStoreInfo");
  const tlEl = document.getElementById("detailTimeline");
  if (!store) {
    infoEl.innerHTML = '<div class="detail-empty">เลือกร้านเพื่อดูรายละเอียด</div>';
    tlEl.innerHTML = "";
    return;
  }
  infoEl.innerHTML = `
    <div class="detail-store-name">${store["Store Name"]}</div>
    <div class="detail-store-meta">${store["Nest Store Code"]} · DC: ${store["DC Code"]}</div>
    <div class="detail-store-meta" style="margin-top:-4px;">Layout: ${store["Store Layout"]||"-"} ตรม.</div>
    <div class="detail-chips">
      <span class="detail-chip" style="background:#1b3a2a;color:#81C784;">จัด: ${store["Replen Pick Amb"]||"-"}</span>
      <span class="detail-chip" style="background:#2a1b3a;color:#CE93D8;">ส่ง: ${store["Replen Deli Amb"]||"-"}</span>
    </div>
  `;

  const schedItems = SCHEDULE_ITEMS.filter(i => store[i.key]);
  const taskItems = TASK_ITEMS.filter(i => i.key !== "Grand Open Date" && store[i.key]);

  const makeRow = (item) => {
    const d = parseDate(store[item.key]);
    if (!d) return "";
    const dateLabel = `${d.getDate()} ${THAI_MONTHS_SHORT[d.getMonth()]}`;
    return `<div class="tl-row">
      <div class="tl-date">${dateLabel}</div>
      <div class="tl-event ${item.cls}" onclick="showModal(allStores.find(s=>s['Nest Store Code']==='${store['Nest Store Code']}'))">${item.label}</div>
    </div>`;
  };

  tlEl.innerHTML = `
    <div class="tl-section">Schedule</div>
    ${schedItems.map(makeRow).join("")}
    <div class="tl-section">Tasks</div>
    ${taskItems.map(makeRow).join("")}
  `;
}

function selectStore(store) {
  document.getElementById("storeSelect").value = store["Nest Store Code"];
  updateDetailPanel(store);
  const openD = parseDate(store["Grand Open Date"]);
  if (openD) {
    viewStart = new Date(getWeekStart(openD));
    viewStart.setDate(viewStart.getDate()-14);
  }
  renderCalendar();
}

function showDayPopup(dateStr, events) {
  const p = dateStr.split("-");
  const d = new Date(parseInt(p[0]), parseInt(p[1])-1, parseInt(p[2]));
  document.getElementById("dayPopupTitle").textContent = `${d.getDate()} ${THAI_MONTHS_SHORT[d.getMonth()]} ${d.getFullYear()}`;
  document.getElementById("dayPopupContent").innerHTML = events.map(ev =>
    `<div class="event ${ev.cls}" style="margin-bottom:4px;cursor:pointer" onclick="selectStore(allStores.find(s=>s['Nest Store Code']==='${ev.store['Nest Store Code']}'));document.getElementById('dayPopupBg').classList.remove('show');">${ev.item&&ev.item.showName?ev.label+': '+ev.store['Store Name']:ev.label+' — '+ev.store['Store Name']}</div>`
  ).join("");
  document.getElementById("dayPopupBg").classList.add("show");
}

function renderConfig() {
  const all = [...SCHEDULE_ITEMS, ...TASK_ITEMS.filter(i=>i.key!=="Grand Open Date")];
  document.getElementById("configBody").innerHTML = all.map(item=>`
    <tr><td>${item.label}</td><td>
      <select onchange="categoryMap['${item.key}']=this.value;renderCalendar();">
        <option value="schedule" ${categoryMap[item.key]==="schedule"?"selected":""}>Schedule</option>
        <option value="tasks" ${categoryMap[item.key]==="tasks"?"selected":""}>Tasks</option>
      </select>
    </td></tr>
  `).join("");
}

async function loadData() {
  try {
    const res = await fetch(CSV_URL+"&t="+Date.now());
    const text = await res.text();
    allStores = parseCSV(text).filter(s=>s["Store Name"]);
    const storeSel = document.getElementById("storeSelect");
    allStores.forEach(s => {
      const opt = document.createElement("option");
      opt.value = s["Nest Store Code"];
      opt.textContent = s["Nest Store Code"]+" - "+s["Store Name"];
      storeSel.appendChild(opt);
    });
    renderCalendar();
    renderConfig();
  } catch(e) {
    document.getElementById("calGrid").innerHTML = '<div class="loading">โหลดข้อมูลไม่ได้ กรุณา refresh</div>';
  }
}

document.getElementById("prevMonth").addEventListener("click", ()=>{ viewStart.setDate(viewStart.getDate()-7); renderCalendar(); });
document.getElementById("nextMonth").addEventListener("click", ()=>{ viewStart.setDate(viewStart.getDate()+7); renderCalendar(); });

let scrollCooldown = false;
document.addEventListener("wheel", (e) => {
  e.preventDefault();
  if (scrollCooldown) return;
  scrollCooldown = true;
  setTimeout(()=>scrollCooldown=false, 300);
  viewStart.setDate(viewStart.getDate()+(e.deltaY>0?7:-7));
  renderCalendar();
}, { passive: false });

document.getElementById("storeSelect").addEventListener("change", function(){
  const store = allStores.find(s=>s["Nest Store Code"]===this.value)||null;
  updateDetailPanel(store);
  if (store && store["Grand Open Date"]) {
    const openD = parseDate(store["Grand Open Date"]);
    if (openD) { viewStart = new Date(getWeekStart(openD)); viewStart.setDate(viewStart.getDate()-14); }
  }
  renderCalendar();
});

document.getElementById("resetBtn").addEventListener("click", ()=>{
  document.getElementById("storeSelect").value = "";
  updateDetailPanel(null);
  viewStart = getWeekStart(today);
  renderCalendar();
});

document.querySelectorAll(".tab-btn").forEach(btn=>{
  btn.addEventListener("click", function(){
    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
    this.classList.add("active");
    const tab = this.dataset.tab;
    if (tab==="config") {
      document.getElementById("calView").style.display="none";
      document.getElementById("configView").style.display="block";
    } else {
      currentTab=tab;
      document.getElementById("calView").style.display="flex";
      document.getElementById("configView").style.display="none";
      renderCalendar();
    }
  });
});

document.getElementById("dayPopupClose").addEventListener("click",()=>document.getElementById("dayPopupBg").classList.remove("show"));
document.getElementById("dayPopupBg").addEventListener("click",e=>{ if(e.target===document.getElementById("dayPopupBg")) document.getElementById("dayPopupBg").classList.remove("show"); });
document.getElementById("modalClose").addEventListener("click",()=>document.getElementById("modalBg").classList.remove("show"));
document.getElementById("modalBg").addEventListener("click",e=>{ if(e.target===document.getElementById("modalBg")) document.getElementById("modalBg").classList.remove("show"); });

loadData();
</script>
</body>
</html>
